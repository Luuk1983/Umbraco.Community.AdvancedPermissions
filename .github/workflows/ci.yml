name: CI

on:
  pull_request:
    branches: [main, 'support/**']
  push:
    branches: [main, 'support/**']

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history needed for MinVer

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build frontend
        working-directory: src/LP.Umbraco.AdvancedPermissions.Client
        run: |
          npm ci
          npm run build

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal

      - name: Pack (verify package builds)
        run: dotnet pack src/LP.Umbraco.AdvancedPermissions/ --configuration Release --output ./artifacts

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: ./artifacts/*.nupkg
          retention-days: 7
